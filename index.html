<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Site</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 40px;
    background:#111;
    color:white;
}
nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
}

/* Hero */
.hero{
    height:90vh;
    background:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f') no-repeat center/cover;
    display:flex;
    align-items:center;
    color:white;
    padding:50px;
}
.hero h1{
    font-size:50px;
}
.btn{
    padding:12px 25px;
    background:#00c896;
    border:none;
    color:white;
    border-radius:5px;
}

/* Section */
.section{
    padding:60px;
    text-align:center;
}

.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    width:300px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px #ccc;
}
.card img{
    width:100%;
}
.card h3{
    padding:10px;
}

/* Blog */
.blog img{
    height:200px;
    object-fit:cover;
}

/* Footer */
footer{
    background:#222;
    color:white;
    padding:20px;
    text-align:center;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav>
    <h2>MySite</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">Blog</a>
        <a href="#">Shop</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- Hero Section -->
<div class="hero">
    <div>
        <h1>The Future of Work</h1>
        <p>Create beautiful websites easily</p>
        <button class="btn">Get Started</button>
    </div>
</div>

<!-- Features -->
<div class="section">
    <h2>Our Features</h2>
    <div class="cards">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
            <h3>Design</h3>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
            <h3>Development</h3>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c">
            <h3>Marketing</h3>
        </div>
    </div>
</div>

<!-- Blog Section -->
<div class="section blog">
    <h2>Latest Blog</h2>
    <div class="cards">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
            <h3>Work Tips</h3>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
            <h3>Business Growth</h3>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1522202222206-b7500c0b31e0">
            <h3>Startup Ideas</h3>
        </div>
    </div>
</div>

<!-- Footer -->
<footer>
    © 2026 MySite | All Rights Reserved
</footer>

</body>
</html>
