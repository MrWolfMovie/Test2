<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarkari Bharti + Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins}

/* Navbar */
nav{
display:flex;justify-content:space-between;
padding:15px 30px;background:#111;color:#fff;
}
nav a{color:#fff;margin-left:15px;text-decoration:none}

/* Hero */
.hero{
height:80vh;
background:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') center/cover;
display:flex;align-items:center;color:#fff;padding:40px;
}
.btn{padding:10px 20px;background:#00c896;border:none;color:#fff}

/* Section */
.section{padding:40px;text-align:center}
.cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.card{
width:280px;padding:15px;
box-shadow:0 0 10px #ccc;border-radius:10px;
}
.card img{width:100%}

/* Quiz */
.quiz{background:#f5f5f5;padding:40px}
footer{background:#111;color:#fff;padding:20px;text-align:center}
</style>

</head>

<body>

<!-- Navbar -->
<nav>
<h2>JobSite</h2>
<div>
<a href="#">Home</a>
<a href="#jobs">Jobs</a>
<a href="#quiz">Quiz</a>
</div>
</nav>

<!-- Hero -->
<div class="hero">
<div>
<h1>Sarkari Bharti & Test</h1>
<p>Daily jobs + Free PYQ tests</p>
<button class="btn">Start Now</button>
</div>
</div>

<!-- Jobs Section -->
<div class="section" id="jobs">
<h2>Latest Jobs</h2>

<div class="cards">
<div class="card">
<h3>SSC GD 2026</h3>
<p>Last Date: 25 April</p>
<button class="btn">Apply</button>
</div>

<div class="card">
<h3>Railway Group D</h3>
<p>Last Date: 10 May</p>
<button class="btn">Apply</button>
</div>

<div class="card">
<h3>Police Constable</h3>
<p>Last Date: 15 May</p>
<button class="btn">Apply</button>
</div>
</div>
</div>

<!-- Quiz Section -->
<div class="quiz" id="quiz">
<h2>PYQ Test</h2>

<p>Q1: भारत की राजधानी क्या है?</p>

<input type="radio" name="q1"> Mumbai <br>
<input type="radio" name="q1" id="correct"> Delhi <br>
<input type="radio" name="q1"> Kolkata <br><br>

<button onclick="check()">Submit</button>

<p id="result"></p>
</div>

<!-- Footer -->
<footer>
© 2026 JobSite | All Rights Reserved
</footer>

<script>
function check(){
let correct=document.getElementById("correct");

if(correct.checked){
document.getElementById("result").innerHTML="✅ सही जवाब!";
}else{
document.getElementById("result").innerHTML="❌ गलत जवाब!";
}
}
</script>

</body>
</html>
