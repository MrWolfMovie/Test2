<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #111;
    color: white;
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

/* Hero */
.hero {
    height: 90vh;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('https://picsum.photos/1200/700');
    background-size: cover;
    display: flex;
    align-items: center;
    color: white;
    padding: 40px;
}

.hero h1 {
    font-size: 45px;
}

.btn {
    padding: 12px 25px;
    background: #00c896;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

/* Sections */
.section {
    padding: 50px;
    text-align: center;
}

.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    width: 280px;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ddd;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* Pricing */
.pricing {
    background: #f5f5f5;
    padding: 50px;
}

.price-box {
    display: inline-block;
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
    background: white;
    box-shadow: 0 0 10px #ccc;
}

/* Footer */
footer {
    background: #222;
    color: white;
    padding: 20px;
    text-align: center;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav>
    <div><b>MyProSite</b></div>
    <div>
        <a href="#">Home</a>
        <a href="#">Blog</a>
        <a href="#">Shop</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- Hero -->
<div class="hero">
    <div>
        <h1>Future of Work</h1>
        <p>अपनी वेबसाइट बनाओ और पैसे कमाओ</p>
        <button class="btn">Start Now</button>
    </div>
</div>

<!-- Features -->
<div class="section">
    <h2>Features</h2>
    <div class="cards">
        <div class="card">
            <img src="https://picsum.photos/300/200">
            <h3>Fast</h3>
            <p>तेज वेबसाइट</p>
        </div>
        <div class="card">
            <img src="https://picsum.photos/301/200">
            <h3>Responsive</h3>
            <p>मोबाइल फ्रेंडली</p>
        </div>
        <div class="card">
            <img src="https://picsum.photos/302/200">
            <h3>Modern</h3>
            <p>क्लीन डिजाइन</p>
        </div>
    </div>
</div>

<!-- Pricing -->
<div class="pricing">
    <h2>Pricing</h2>
    <div class="price-box">
        <h3>Basic</h3>
        <p>₹0 / month</p>
    </div>
    <div class="price-box">
        <h3>Pro</h3>
        <p>₹199 / month</p>
    </div>
</div>

<!-- Blog -->
<div class="section">
    <h2>Blog</h2>
    <div class="cards">
        <div class="card">
            <img src="https://picsum.photos/303/200">
            <h3>Blog 1</h3>
        </div>
        <div class="card">
            <img src="https://picsum.photos/304/200">
            <h3>Blog 2</h3>
        </div>
    </div>
</div>

<!-- Footer -->
<footer>
    © 2026 MyProSite | All Rights Reserved
</footer>

</body>
</html>
